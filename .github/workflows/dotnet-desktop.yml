# Build and publish the WPF app (win-x64).
# Artifacts (main / manual only):
#   - *-framework: needs .NET 9 Windows Desktop Runtime installed.
#   - *-selfcontained: all-in-one single-folder build (larger; no separate runtime install).

name: WPF build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Use Node 24 for JS-based actions (checkout, setup-dotnet, upload-artifact); Node 20 is deprecated on runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "9.0.x"
  SLN_PATH: Adventure League Log Downloader.sln
  CSPROJ_PATH: Adventure League Log Downloader/Adventure League Log Downloader.csproj
  PUBLISH_OUT_FRAMEWORK: Adventure League Log Downloader/bin/Release/net9.0-windows/publish/win-x64
  PUBLISH_OUT_SELFCONTAINED: Adventure League Log Downloader/bin/Release/net9.0-windows/publish/win-x64-selfcontained

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SLN_PATH }}"

      - name: Build (pull requests)
        if: github.event_name == 'pull_request'
        run: dotnet build "${{ env.SLN_PATH }}" -c Release --no-restore

      - name: Publish (framework-dependent)
        if: github.event_name != 'pull_request'
        run: dotnet publish "${{ env.CSPROJ_PATH }}" -c Release -p:PublishProfile=FolderProfile --no-restore

      - name: Publish (self-contained, all-in-one)
        if: github.event_name != 'pull_request'
        run: dotnet publish "${{ env.CSPROJ_PATH }}" -c Release -p:PublishProfile=SelfContainedProfile --no-restore

      - name: Upload framework-dependent build
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: AdventurersLeagueLogDownloader-win-x64-framework
          path: ${{ env.PUBLISH_OUT_FRAMEWORK }}

      - name: Upload self-contained build
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: AdventurersLeagueLogDownloader-win-x64-selfcontained
          path: ${{ env.PUBLISH_OUT_SELFCONTAINED }}
