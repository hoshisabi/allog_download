# Build and publish the WPF app (win-x64, FolderProfile).
# Artifacts appear under each successful run on main (Actions → workflow run → Artifacts).
# FolderProfile is framework-dependent; end users need the .NET 9 Desktop Runtime on Windows x64,
# unless you publish self-contained locally for releases.

name: WPF build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  SLN_PATH: Adventure League Log Downloader.sln
  CSPROJ_PATH: Adventure League Log Downloader/Adventure League Log Downloader.csproj
  PUBLISH_OUT: Adventure League Log Downloader/bin/Release/net9.0-windows/publish/win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SLN_PATH }}"

      - name: Build (pull requests)
        if: github.event_name == 'pull_request'
        run: dotnet build "${{ env.SLN_PATH }}" -c Release --no-restore

      - name: Publish (main & manual)
        if: github.event_name != 'pull_request'
        run: dotnet publish "${{ env.CSPROJ_PATH }}" -c Release -p:PublishProfile=FolderProfile --no-restore

      - name: Upload publish output
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AdventurersLeagueLogDownloader-win-x64
          path: ${{ env.PUBLISH_OUT }}
