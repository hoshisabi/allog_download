# On push of a semver-style tag (v*.*.*), publish WPF win-x64 builds and attach ZIPs to that tag's GitHub Release.
# Creates the release if it does not exist; enables GitHub-generated release notes.

name: WPF release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach (e.g. v0.1.0); must exist on the remote"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "10.0.x"
  SLN_PATH: Adventure League Log Downloader.sln
  CSPROJ_PATH: Adventure League Log Downloader/Adventure League Log Downloader.csproj
  PUBLISH_OUT_FRAMEWORK: Adventure League Log Downloader/bin/Release/net10.0-windows/publish/win-x64
  PUBLISH_OUT_SELFCONTAINED: Adventure League Log Downloader/bin/Release/net10.0-windows/publish/win-x64-selfcontained

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SLN_PATH }}"

      - name: Publish (framework-dependent)
        run: dotnet publish "${{ env.CSPROJ_PATH }}" -c Release -p:PublishProfile=FolderProfile --no-restore

      - name: Publish (self-contained)
        run: dotnet publish "${{ env.CSPROJ_PATH }}" -c Release -p:PublishProfile=SelfContainedProfile --no-restore

      - name: Zip publish outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:RELEASE_TAG
          $ws = '${{ github.workspace }}'
          $fw = Join-Path $ws $env:PUBLISH_OUT_FRAMEWORK
          $sc = Join-Path $ws $env:PUBLISH_OUT_SELFCONTAINED
          $zipFw = Join-Path $ws "AdventurersLeagueLogDownloader-$tag-win-x64-framework.zip"
          $zipSc = Join-Path $ws "AdventurersLeagueLogDownloader-$tag-win-x64-selfcontained.zip"
          Compress-Archive -Path (Join-Path $fw '*') -DestinationPath $zipFw -Force
          Compress-Archive -Path (Join-Path $sc '*') -DestinationPath $zipSc -Force

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            AdventurersLeagueLogDownloader-${{ env.RELEASE_TAG }}-win-x64-framework.zip
            AdventurersLeagueLogDownloader-${{ env.RELEASE_TAG }}-win-x64-selfcontained.zip
